name: progress-site

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write
  issues: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install project
        run: python -m pip install -q -e '.[dev]'

      - name: Run complete regression suite
        id: tests
        continue-on-error: true
        shell: bash
        run: |
          pytest -q --tb=short > /tmp/progress-site-pytest.log 2>&1
          cat /tmp/progress-site-pytest.log

      - name: Build live progress data
        shell: bash
        env:
          TEST_OUTCOME: ${{ steps.tests.outcome }}
        run: |
          TEST_SUMMARY="$(tail -n 1 /tmp/progress-site-pytest.log)"
          export TEST_SUMMARY
          python scripts/build_progress_site.py

      - name: Keep test log for audit
        uses: actions/upload-artifact@v4
        with:
          name: progress-site-pytest-log
          path: /tmp/progress-site-pytest.log
          retention-days: 7

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload progress site
        uses: actions/upload-pages-artifact@v3
        with:
          path: _progress_site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  report:
    if: always()
    runs-on: ubuntu-latest
    needs: [build, deploy]
    steps:
      - name: Update deployment status issue
        env:
          GH_TOKEN: ${{ github.token }}
          BUILD_RESULT: ${{ needs.build.result }}
          DEPLOY_RESULT: ${{ needs.deploy.result }}
          SITE_URL: https://shengtenghou4-star.github.io/3/
          COMMIT_SHA: ${{ github.sha }}
          RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
        shell: bash
        run: |
          if [ "$DEPLOY_RESULT" = "success" ]; then
            OVERALL="✅ 已上线"
          elif [ "$BUILD_RESULT" = "success" ]; then
            OVERALL="⚠️ 网页已构建，但 Pages 发布失败"
          else
            OVERALL="❌ 构建失败"
          fi

          BODY=$(cat <<EOF
          <!-- progress-site-status -->
          ## ${OVERALL}

          - **网页地址：** ${SITE_URL}
          - **构建结果：** ${BUILD_RESULT}
          - **Pages 部署：** ${DEPLOY_RESULT}
          - **主分支提交：** \`${COMMIT_SHA}\`
          - **工作流记录：** ${RUN_URL}

          这条评论由 \`progress-site\` 工作流自动更新。每次主分支变化都会重新运行完整测试并发布进度站。
          EOF
          )

          COMMENT_ID=$(gh api --paginate "repos/${GITHUB_REPOSITORY}/issues/23/comments" \
            --jq '.[] | select(.body | contains("<!-- progress-site-status -->")) | .id' \
            | head -n 1)

          if [ -n "$COMMENT_ID" ]; then
            gh api --method PATCH "repos/${GITHUB_REPOSITORY}/issues/comments/${COMMENT_ID}" -f body="$BODY" >/dev/null
          else
            gh api --method POST "repos/${GITHUB_REPOSITORY}/issues/23/comments" -f body="$BODY" >/dev/null
          fi
