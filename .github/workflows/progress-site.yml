name: progress-site

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install project
        run: python -m pip install -q -e '.[dev]'

      - name: Run complete regression suite
        id: tests
        continue-on-error: true
        shell: bash
        run: |
          pytest -q --tb=short > /tmp/progress-site-pytest.log 2>&1
          cat /tmp/progress-site-pytest.log

      - name: Build live progress data
        shell: bash
        env:
          TEST_OUTCOME: ${{ steps.tests.outcome }}
        run: |
          TEST_SUMMARY="$(tail -n 1 /tmp/progress-site-pytest.log)"
          export TEST_SUMMARY
          python scripts/build_progress_site.py

      - name: Keep test log for audit
        uses: actions/upload-artifact@v4
        with:
          name: progress-site-pytest-log
          path: /tmp/progress-site-pytest.log
          retention-days: 7

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload progress site
        uses: actions/upload-pages-artifact@v3
        with:
          path: _progress_site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
