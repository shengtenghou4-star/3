name: browser-pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: browser-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install project
        run: python -m pip install -q -e '.[dev]'

      - name: Run complete regression suite
        shell: bash
        run: |
          pytest -q --tb=short | tee /tmp/browser-pages-pytest.log

      - name: Build browser site
        shell: bash
        env:
          TEST_OUTCOME: success
        run: |
          TEST_SUMMARY="$(tail -n 1 /tmp/browser-pages-pytest.log)"
          export TEST_SUMMARY
          python scripts/build_progress_site.py
          test -f _progress_site/game/index.html

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload browser site
        uses: actions/upload-pages-artifact@v3
        with:
          path: _progress_site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
