name: tests

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  workflow_dispatch:

jobs:
  pytest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          show-progress: false
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install
        run: python -m pip install -q -e '.[dev]'
      - name: Test
        id: pytest
        continue-on-error: true
        run: pytest -q --tb=short > pytest.log 2>&1
      - name: Upload pytest log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-log
          path: pytest.log
          retention-days: 3
      - name: Report failure
        if: steps.pytest.outcome == 'failure'
        run: |
          tail -80 pytest.log
          exit 1
