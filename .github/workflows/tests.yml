name: tests

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  pytest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          show-progress: false
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install
        id: install
        continue-on-error: true
        run: python -m pip install -q -e '.[dev]' > install.log 2>&1
      - name: Test
        id: pytest
        if: ${{ steps.install.outcome == 'success' }}
        continue-on-error: true
        run: pytest -q --tb=short > pytest.log 2>&1
      - name: Publish diagnostics to PR
        if: ${{ always() && github.event_name == 'pull_request' }}
        uses: actions/github-script@v7
        env:
          INSTALL_OUTCOME: ${{ steps.install.outcome }}
          PYTEST_OUTCOME: ${{ steps.pytest.outcome }}
        with:
          script: |
            const fs = require('fs');
            const tail = (path, lines) => {
              if (!fs.existsSync(path)) return '(no log file)';
              const content = fs.readFileSync(path, 'utf8').split('\n');
              return content.slice(-lines).join('\n');
            };
            const marker = '<!-- visual-ci-diagnostics -->';
            const body = `${marker}\n## Visual CI diagnostics\n\n` +
              `- install: \`${process.env.INSTALL_OUTCOME}\`\n` +
              `- pytest: \`${process.env.PYTEST_OUTCOME}\`\n\n` +
              `**install.log**\n\`\`\`\n${tail('install.log', 60)}\n\`\`\`\n\n` +
              `**pytest.log**\n\`\`\`\n${tail('pytest.log', 120)}\n\`\`\``;
            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner, repo, issue_number, per_page: 100
            });
            const existing = comments.find(item => item.body && item.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({owner, repo, comment_id: existing.id, body});
            } else {
              await github.rest.issues.createComment({owner, repo, issue_number, body});
            }
      - name: Enforce result
        if: ${{ steps.install.outcome != 'success' || steps.pytest.outcome != 'success' }}
        run: exit 1
